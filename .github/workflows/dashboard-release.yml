name: Dashboard Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            asset_suffix: linux-amd64
          - os: linux
            arch: arm64
            goarch: arm64
            asset_suffix: linux-arm64
          - os: linux
            arch: arm6
            goarch: arm
            goarm: "6"
            asset_suffix: linux-arm6

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build dashboard
        working-directory: dashboard
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p ../build
          go build \
            -ldflags "-X main.Version=${GITHUB_REF_NAME} -X 'main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -o ../build/smart-wifi-manager-dashboard-${{ matrix.asset_suffix }} \
            ./cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-wifi-manager-dashboard-${{ matrix.asset_suffix }}
          path: build/smart-wifi-manager-dashboard-${{ matrix.asset_suffix }}

  publish:
    runs-on: ubuntu-latest
    needs: build-dashboard
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/smart-wifi-manager-dashboard-*
